name: Go
on:
  pull_request:
    branches:
      - main  # Pre-merge validation
  merge_group:
    branches:
      - main  # Merge queue validation

jobs:
  call:
    name: Call
    uses: neatplatform/actions/.github/workflows/reusable-go.yml@main
    permissions:
      contents: read
    with:
      build_command: make build
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
